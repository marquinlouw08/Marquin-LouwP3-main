<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enquiry</title>
  <link rel="stylesheet" href="style.css">

  <!-- EmailJS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
  <h1>Enquiry</h1>

  <!-- Top navigation bar -->
  <nav class="navbar">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="product.html">Products</a></li>
      <li><a href="enquiry.html">Enquiry</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <!-- Enquiry box -->
  <div class="enquiry-container">
    <h2>Enquiry</h2>

    <!-- Toggle -->
    <div class="toggle">
      <input type="radio" id="loginTab" name="tab" checked>
      <label for="loginTab">Login</label>
      <input type="radio" id="signupTab" name="tab">
      <label for="signupTab">Signup</label>
    </div>

    <!-- Login Form -->
    <form id="loginForm">
      <input type="email" id="loginEmail" name="login_email" placeholder="Email Address" required>
      <input type="password" id="loginPassword" name="login_password" placeholder="Password" required>
      <a href="#" id="forgotPassword">Forgot password?</a>
      <button type="submit">Login</button>
    </form>

    <!-- Signup Form -->
    <form id="signupForm" class="hidden">
      <input type="email" id="signupEmail" name="signup_email" placeholder="Email Address" required>
      <input type="password" id="signupPassword" name="signup_password" placeholder="Password" required>
      <input type="password" id="confirmPassword" name="confirm_password" placeholder="Confirm Password" required>
      <button type="submit">Signup</button>
    </form>
  </div> <!-- ✅ enquiry-container closed here -->

  <!-- Stars animation container -->
  <div id="stars" class="stars hidden"></div>

  <!-- Popup -->
  <div id="popup" class="popup hidden">
    <p>✅ Email has been sent!</p>
    <button id="closePopup">Close</button>
  </div>

  <!-- Footer OUTSIDE the box -->
  <footer>
    <p>Copyright © 2026 Jason Bakery. All rights reserved.</p>
  </footer>

  <!-- Bottom navigation bar OUTSIDE the box -->
  <nav class="navbar">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="product.html">Products</a></li>
      <li><a href="enquiry.html">Enquiry</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <!-- Scripts -->
  <script src="script.js"></script>
  <script src="contact.js"></script>
</body>
</html>
